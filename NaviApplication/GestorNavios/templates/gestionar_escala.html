{% extends "interfazBase.html" %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'CrearEscalaStyle.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-4" style="font-size: 1.6rem !important;">
    <form id="formEscala" method="POST" class="needs-validation" novalidate>
        {% csrf_token %}
        <div class="mb-3">
            <label for="escala_nombre" class="form-label">Nombre de la Escala:</label>
            <input type="text" name="escala_nombre" id="escala_nombre" class="form-control" required style="font-size: 1.6rem !important;">
            <div class="invalid-feedback">
                El nombre de la escala es obligatorio.
            </div>
        </div>

        <h5 class="mt-4 mb-2" style="font-size: 1.6rem;">Puertos y Fechas</h5>
        <div id="puertosContainer" class="mb-3">
            <!-- Puertos agregados dinámicamente -->
        </div>

        <div class="d-flex gap-2">
            <button type="button" id="btnAgregarPuerto" class="btn btn-outline-primary" style="font-size: 1.6rem;">Agregar Puerto</button>
            <button type="submit" class="btn btn-success" style="font-size: 1.6rem;">Crear Escala</button>
        </div>
    </form>

    {% if messages %}
    <div class="alert alert-danger mt-3">
        <ul class="mb-0">
            {% for message in messages %}
            <li>{{ message }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <div id="errores" class="mt-3 text-danger fw-bold"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    let contador = 1;
    const puertosContainer = document.getElementById("puertosContainer");
    const btnAgregarPuerto = document.getElementById("btnAgregarPuerto");

    function crearPuertoHTML(i) {
        return `
            <div class="card mb-3 shadow-sm p-3 puerto-item">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="puerto_id_${i}" class="form-label">Selecciona un Puerto:</label>
                        <select name="puertos[]" id="puerto_id_${i}" class="form-select" required style="font-size: 1.6rem;">
                            {% for puerto in puertos %}
                            <option value="{{ puerto.id }}">{{ puerto.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="fecha_arribo_${i}" class="form-label">Fecha de Arribo:</label>
                        <input type="datetime-local" name="fechas_arribo[]" id="fecha_arribo_${i}" class="form-control" required style="font-size: 1.6rem;">
                    </div>
                    <div class="col-md-4">
                        <label for="fecha_zarpe_${i}" class="form-label">Fecha de Zarpe:</label>
                        <input type="datetime-local" name="fechas_zarpe[]" id="fecha_zarpe_${i}" class="form-control" required style="font-size: 1.6rem;">
                    </div>
                </div>
                <div class="text-end mt-3">
                    <button type="button" class="btn btn-danger btnEliminarPuerto" style="font-size: 1.4rem;">Eliminar</button>
                </div>
            </div>
        `;
    }

    btnAgregarPuerto.addEventListener("click", function () {
        puertosContainer.insertAdjacentHTML('beforeend', crearPuertoHTML(contador));
        contador++;
    });

    // Agregar uno por defecto
    btnAgregarPuerto.click();

    // Delegación para eliminar puertos
    puertosContainer.addEventListener("click", function (e) {
        if (e.target.classList.contains("btnEliminarPuerto")) {
            e.target.closest(".puerto-item").remove();
        }
    });
});
</script>

<script>
document.getElementById("formEscala").addEventListener("submit", function (e) {
    let errores = [];
    let escalaNombreInput = document.getElementById("escala_nombre");
    let escalaNombre = escalaNombreInput.value.trim();

    if (!escalaNombre) {
        errores.push("Debe ingresar un nombre para la escala.");
        escalaNombreInput.classList.add("is-invalid");
    } else {
        escalaNombreInput.classList.remove("is-invalid");
    }

    let items = document.querySelectorAll(".puerto-item");
    let ultimaFechaZarpe = null;

    for (let i = 0; i < items.length; i++) {
        let item = items[i];
        let arriboInput = item.querySelector('input[name="fechas_arribo[]"]');
        let zarpeInput = item.querySelector('input[name="fechas_zarpe[]"]');
        let arribo = arriboInput.value;
        let zarpe = zarpeInput.value;

        if (!arribo || !zarpe) {
            errores.push(`Debe ingresar ambas fechas en el puerto ${i + 1}.`);
            continue;
        }

        let fechaArribo = new Date(arribo);
        let fechaZarpe = new Date(zarpe);

        if (fechaArribo >= fechaZarpe) {
            errores.push(`En el puerto ${i + 1}, la fecha de arribo debe ser anterior a la de zarpe.`);
            arriboInput.classList.add("is-invalid");
            zarpeInput.classList.add("is-invalid");
        }

        if (ultimaFechaZarpe && fechaArribo < ultimaFechaZarpe) {
            errores.push(`La fecha de arribo del puerto ${i + 1} debe ser posterior a la de zarpe del puerto anterior.`);
            arriboInput.classList.add("is-invalid");
        }

        ultimaFechaZarpe = fechaZarpe;
    }

    if (errores.length > 0) {
        e.preventDefault();
        document.getElementById("errores").innerText = errores.join("\n");
    }
});
</script>
{% endblock %}
